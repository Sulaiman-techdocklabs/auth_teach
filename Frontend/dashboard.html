<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard - Employee Management System</title>
    <link rel="stylesheet" href="css/dashboard.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <i class="fas fa-users-cog"></i>
                    <span>EMS</span>
                </div>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item active">
                    <i class="fas fa-chart-pie"></i>
                    <span>Dashboard</span>
                </a>
                <a href="attendance.html" class="nav-item">
                    <i class="fas fa-clock"></i>
                    <span>Attendance</span>
                </a>
                <a href="leave.html" class="nav-item">
                    <i class="fas fa-calendar-check"></i>
                    <span>Leave</span>
                </a>
                <a href="profile.html" class="nav-item">
                    <i class="fas fa-user"></i>
                    <span>Profile</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <button id="logoutBtn" class="logout-btn">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Logout</span>
                </button>
            </div>
        </aside>
        <!-- Main Content -->
        <main class="main-content">
            <!-- Top Bar -->
            <header class="top-bar">
                <div class="menu-toggle" id="menuToggle">
                    <i class="fas fa-bars"></i>
                </div>
                <div class="user-info">
                    <span id="userName">Loading...</span>
                    <div class="avatar">
                        <i class="fas fa-user-circle"></i>
                    </div>
                </div>
            </header>
            <!-- Dashboard Content -->
            <div class="content">
                <h1 class="page-title">Dashboard</h1>
                <p class="page-subtitle">Welcome back! Here's your attendance overview.</p>
                <!-- Stats Cards -->
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon present">
                            <i class="fas fa-check-circle"></i>
                        </div>
                        <div class="stat-info">
                            <h3 id="presentDays">0</h3>
                            <p>Present Days</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon half-day">
                            <i class="fas fa-clock"></i>
                        </div>
                        <div class="stat-info">
                            <h3 id="halfDays">0</h3>
                            <p>Half Days</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon absent">
                            <i class="fas fa-times-circle"></i>
                        </div>
                        <div class="stat-info">
                            <h3 id="absentDays">0</h3>
                            <p>Absent Days</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon leave">
                            <i class="fas fa-calendar-alt"></i>
                        </div>
                        <div class="stat-info">
                            <h3 id="totalLeaves">0</h3>
                            <p>Total Leaves</p>
                        </div>
                    </div>
                </div>
                <!-- Today's Attendance -->
                <div class="today-attendance">
                    <h2>Today's Attendance</h2>
                    <div id="todayAttendanceCard" class="attendance-card">
                        <div class="attendance-status">
                            <div class="status-indicator" id="todayStatus">
                                <i class="fas fa-hourglass-half"></i>
                                <span>Not Punched In</span>
                            </div>
                        </div>
                        <div class="attendance-details">
                            <div class="detail-item">
                                <label>Punch In</label>
                                <span id="todayPunchIn">--:--</span>
                            </div>
                            <div class="detail-item">
                                <label>Punch Out</label>
                                <span id="todayPunchOut">--:--</span>
                            </div>
                            <div class="detail-item">
                                <label>Total Hours</label>
                                <span id="todayTotalHours">0.00</span>
                            </div>
                        </div>
                    </div>
                </div>
                <!-- Recent Activity -->
                <div class="recent-activity">
                    <div class="section-header">
                        <h2>Recent Activity</h2>
                    </div>
                    <div id="recentActivity" class="activity-list">
                        <p class="no-data">No recent activity</p>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <!-- Toast Notification -->
    <div id="toast" class="toast"></div>
    <!-- IMPORTANT: Load as module -->
    <script type="module" src="js/dashboard.js"></script>
</body>
</html>
