<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile - Employee Management System</title>
    <link rel="stylesheet" href="css/dashboard.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <i class="fas fa-users-cog"></i>
                    <span>EMS</span>
                </div>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item">
                    <i class="fas fa-chart-pie"></i>
                    <span>Dashboard</span>
                </a>
                <a href="attendance.html" class="nav-item">
                    <i class="fas fa-clock"></i>
                    <span>Attendance</span>
                </a>
                <a href="leave.html" class="nav-item">
                    <i class="fas fa-calendar-check"></i>
                    <span>Leave</span>
                </a>
                <a href="profile.html" class="nav-item active">
                    <i class="fas fa-user"></i>
                    <span>Profile</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <button id="logoutBtn" class="logout-btn">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Logout</span>
                </button>
            </div>
        </aside>
        <!-- Main Content -->
        <main class="main-content">
            <header class="top-bar">
                <div class="menu-toggle" id="menuToggle">
                    <i class="fas fa-bars"></i>
                </div>
                <div class="user-info">
                    <span id="userName">Loading...</span>
                    <div class="avatar">
                        <i class="fas fa-user-circle"></i>
                    </div>
                </div>
            </header>
            <div class="content">
                <h1 class="page-title">Profile</h1>
                <p class="page-subtitle">View your account information.</p>
                <div class="profile-card">
                    <div class="profile-avatar">
                        <i class="fas fa-user-circle"></i>
                        <h2 id="profileName">Loading...</h2>
                        <span class="badge" id="profileStatus">Not Verified</span>
                    </div>
                    <div class="profile-details">
                        <div class="detail-row">
                            <div class="detail-label">Full Name</div>
                            <div class="detail-value" id="profileFullName">-</div>
                        </div>
                        <div class="detail-row">
                            <div class="detail-label">Username</div>
                            <div class="detail-value" id="profileUsername">-</div>
                        </div>
                        <div class="detail-row">
                            <div class="detail-label">Email Address</div>
                            <div class="detail-value" id="profileEmail">-</div>
                        </div>
                        <div class="detail-row">
                            <div class="detail-label">Account Status</div>
                            <div class="detail-value" id="profileVerified">-</div>
                        </div>
                        <div class="detail-row">
                            <div class="detail-label">Auth Provider</div>
                            <div class="detail-value" id="profileProvider">-</div>
                        </div>
                        <div class="detail-row">
                            <div class="detail-label">Joined</div>
                            <div class="detail-value" id="profileJoined">-</div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <div id="toast" class="toast"></div>
    <script src="js/api.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/profile.js"></script>
</body>
</html>
