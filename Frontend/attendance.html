<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Attendance - Employee Management System</title>
    <link rel="stylesheet" href="css/dashboard.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <i class="fas fa-users-cog"></i>
                    <span>EMS</span>
                </div>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item">
                    <i class="fas fa-chart-pie"></i>
                    <span>Dashboard</span>
                </a>
                <a href="attendance.html" class="nav-item active">
                    <i class="fas fa-clock"></i>
                    <span>Attendance</span>
                </a>
                <a href="leave.html" class="nav-item">
                    <i class="fas fa-calendar-check"></i>
                    <span>Leave</span>
                </a>
                <a href="profile.html" class="nav-item">
                    <i class="fas fa-user"></i>
                    <span>Profile</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <button id="logoutBtn" class="logout-btn">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Logout</span>
                </button>
            </div>
        </aside>
        <!-- Main Content -->
        <main class="main-content">
            <header class="top-bar">
                <div class="menu-toggle" id="menuToggle">
                    <i class="fas fa-bars"></i>
                </div>
                <div class="user-info">
                    <span id="userName">Loading...</span>
                    <div class="avatar">
                        <i class="fas fa-user-circle"></i>
                    </div>
                </div>
            </header>
            <div class="content">
                <h1 class="page-title">Attendance</h1>
                <p class="page-subtitle">Manage your daily attendance records.</p>
                <!-- Today's Attendance -->
                <div class="today-attendance">
                    <h2>Today's Attendance</h2>
                    <div id="todayAttendanceCard" class="attendance-card">
                        <div class="attendance-status">
                            <div class="status-indicator" id="todayStatus">
                                <i class="fas fa-hourglass-half"></i>
                                <span>Not Punched In</span>
                            </div>
                        </div>
                        <div class="attendance-details">
                            <div class="detail-item">
                                <label>Punch In</label>
                                <span id="todayPunchIn">--:--</span>
                            </div>
                            <div class="detail-item">
                                <label>Punch Out</label>
                                <span id="todayPunchOut">--:--</span>
                            </div>
                            <div class="detail-item">
                                <label>Total Hours</label>
                                <span id="todayTotalHours">0.00</span>
                            </div>
                        </div>
                        <div class="attendance-actions">
                            <button id="punchInBtn" class="btn btn-success">
                                <i class="fas fa-fingerprint"></i> Punch In
                            </button>
                            <button id="punchOutBtn" class="btn btn-danger" disabled>
                                <i class="fas fa-fingerprint"></i> Punch Out
                            </button>
                        </div>
                    </div>
                </div>
                <!-- Attendance History -->
                <div class="history-section">
                    <h2>Attendance History</h2>
                    <div id="attendanceHistory" class="table-container">
                        <div class="table-wrapper">
                            <table>
                                <thead>
                                    <tr>
                                        <th>Date</th>
                                        <th>Punch In</th>
                                        <th>Punch Out</th>
                                        <th>Hours</th>
                                        <th>Status</th>
                                    </tr>
                                </thead>
                                <tbody id="attendanceTableBody">
                                    <tr>
                                        <td colspan="5" class="no-data">No attendance records found</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <div id="toast" class="toast"></div>
    <script type="module" src="js/attendance.js"></script>
</body>
</html>
