<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Leave - Employee Management System</title>
    <link rel="stylesheet" href="css/dashboard.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <i class="fas fa-users-cog"></i>
                    <span>EMS</span>
                </div>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item">
                    <i class="fas fa-chart-pie"></i>
                    <span>Dashboard</span>
                </a>
                <a href="attendance.html" class="nav-item">
                    <i class="fas fa-clock"></i>
                    <span>Attendance</span>
                </a>
                <a href="leave.html" class="nav-item active">
                    <i class="fas fa-calendar-check"></i>
                    <span>Leave</span>
                </a>
                <a href="profile.html" class="nav-item">
                    <i class="fas fa-user"></i>
                    <span>Profile</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <button id="logoutBtn" class="logout-btn">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Logout</span>
                </button>
            </div>
        </aside>
        <!-- Main Content -->
        <main class="main-content">
            <header class="top-bar">
                <div class="menu-toggle" id="menuToggle">
                    <i class="fas fa-bars"></i>
                </div>
                <div class="user-info">
                    <span id="userName">Loading...</span>
                    <div class="avatar">
                        <i class="fas fa-user-circle"></i>
                    </div>
                </div>
            </header>
            <div class="content">
                <h1 class="page-title">Leave Management</h1>
                <p class="page-subtitle">Apply for leave and view your leave history.</p>
                <!-- Apply Leave -->
                <div class="apply-leave-section">
                    <h2>Apply for Leave</h2>
                    <form id="leaveForm" class="leave-form">
                        <div class="form-row">
                            <div class="form-group">
                                <label for="leaveType">Leave Type *</label>
                                <select id="leaveType" required>
                                    <option value="">Select Leave Type</option>
                                    <option value="Casual Leave">Casual Leave</option>
                                    <option value="Sick Leave">Sick Leave</option>
                                    <option value="Work From Home">Work From Home</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="leaveDate">Leave Date *</label>
                                <input type="date" id="leaveDate" required />
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="leaveReason">Reason *</label>
                            <textarea id="leaveReason" rows="3" placeholder="Describe your reason for leave..." required></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary">Apply for Leave</button>
                    </form>
                </div>
                <!-- Leave History -->
                <div class="history-section">
                    <h2>Leave History</h2>
                    <div id="leaveHistory" class="table-container">
                        <div class="table-wrapper">
                            <table>
                                <thead>
                                    <tr>
                                        <th>Date</th>
                                        <th>Leave Type</th>
                                        <th>Reason</th>
                                        <th>Status</th>
                                    </tr>
                                </thead>
                                <tbody id="leaveTableBody">
                                    <tr>
                                        <td colspan="4" class="no-data">No leave records found</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <div id="toast" class="toast"></div>
    <script src="js/api.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/leave.js"></script>
</body>
</html>
